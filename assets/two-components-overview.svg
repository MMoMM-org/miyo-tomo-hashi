<svg width="100%" viewBox="0 0 1280 720" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>MiYo Tomo Hashi — Two components, one plugin</title>
  <desc>Architecture overview showing the two functional components of MiYo Tomo Hashi: A) Tomo Session GUI with the 友 status-bar icon, B) Instruction Executor with the 橋 status-bar icon. The two components share the plugin process and settings tab but are otherwise independent.</desc>

  <!-- Outer frame -->
  <rect x="40" y="40" width="1200" height="640" rx="6" fill="#ffffff" stroke="#111111" stroke-width="2"/>

  <!-- Title block at the top -->
  <text x="640" y="98" font-family="serif" font-size="22" fill="#111111" text-anchor="middle" font-weight="500">MiYo Tomo Hashi</text>
  <text x="640" y="124" font-family="monospace" font-size="12" fill="#888888" text-anchor="middle" letter-spacing="1.5" xml:space="preserve">T W O  C O M P O N E N T S  ·  O N E  P L U G I N</text>

  <!-- Divider under title -->
  <line x1="160" y1="148" x2="1120" y2="148" stroke="#111111" stroke-width="1" opacity="0.25"/>

  <!-- Vertical column divider -->
  <line x1="640" y1="180" x2="640" y2="600" stroke="#111111" stroke-width="1" opacity="0.5" stroke-dasharray="2 4"/>

  <!-- ================= LEFT COLUMN — A ================= -->

  <!-- "A" badge -->
  <circle cx="120" cy="200" r="20" fill="#111111"/>
  <text x="120" y="207" font-family="serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="500">A</text>

  <!-- Component title -->
  <text x="160" y="207" font-family="monospace" font-size="14" fill="#111111" letter-spacing="1">TOMO SESSION GUI</text>
  <text x="160" y="228" font-family="monospace" font-size="11" fill="#666666">talk to Claude Code from inside Obsidian</text>

  <!-- Big kanji 友 -->
  <text x="340" y="425" font-family="serif" font-size="180" fill="#111111" text-anchor="middle" font-weight="400">友</text>

  <!-- Status bar reference -->
  <rect x="244" y="440" width="192" height="32" rx="4" fill="#ffffff" stroke="#111111" stroke-width="1" opacity="0.6"/>
  <text x="270" y="461" font-family="serif" font-size="18" fill="#111111" text-anchor="middle">友</text>
  <text x="290" y="461" font-family="monospace" font-size="11" fill="#555555">  status-bar icon</text>

  <!-- Feature bullets -->
  <text x="100" y="508" font-family="monospace" font-size="13" fill="#222222">·  Chat view  ←→  xterm.js</text>
  <text x="100" y="534" font-family="monospace" font-size="13" fill="#222222">·  Docker container attach</text>
  <text x="100" y="560" font-family="monospace" font-size="13" fill="#222222">·  Force reconnect, zoom</text>
  <text x="100" y="586" font-family="monospace" font-size="13" fill="#222222">·  No external surface</text>

  <!-- ================= RIGHT COLUMN — B ================= -->

  <!-- "B" badge -->
  <circle cx="720" cy="200" r="20" fill="#111111"/>
  <text x="720" y="207" font-family="serif" font-size="22" fill="#ffffff" text-anchor="middle" font-weight="500">B</text>

  <!-- Component title -->
  <text x="760" y="207" font-family="monospace" font-size="14" fill="#111111" letter-spacing="1">INSTRUCTION EXECUTOR</text>
  <text x="760" y="228" font-family="monospace" font-size="11" fill="#666666">apply Tomo's vault edits with preview + log</text>

  <!-- Big kanji 橋 -->
  <text x="940" y="425" font-family="serif" font-size="180" fill="#111111" text-anchor="middle" font-weight="400">橋</text>

  <!-- Status bar reference -->
  <rect x="844" y="440" width="192" height="32" rx="4" fill="#ffffff" stroke="#111111" stroke-width="1" opacity="0.6"/>
  <text x="870" y="461" font-family="serif" font-size="18" fill="#111111" text-anchor="middle">橋</text>
  <text x="890" y="461" font-family="monospace" font-size="11" fill="#555555">  status-bar icon</text>

  <!-- Feature bullets -->
  <text x="700" y="508" font-family="monospace" font-size="13" fill="#222222">·  _instructions.json runner</text>
  <text x="700" y="534" font-family="monospace" font-size="13" fill="#222222">·  Preview / progress / summary</text>
  <text x="700" y="560" font-family="monospace" font-size="13" fill="#222222">·  Hooks (.cjs, ask-mode)</text>
  <text x="700" y="586" font-family="monospace" font-size="13" fill="#222222">·  Run log per execution</text>

  <!-- ================= BOTTOM STRIP ================= -->

  <line x1="160" y1="610" x2="1120" y2="610" stroke="#111111" stroke-width="1" opacity="0.25"/>
  <text x="640" y="640" font-family="monospace" font-size="11" fill="#888888" text-anchor="middle">Shared plugin process and settings tab.  Nothing shared at runtime — different code paths, different state, different status-bar icons.</text>

</svg>
