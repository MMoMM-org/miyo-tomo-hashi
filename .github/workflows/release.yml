name: Release

on:
    push:
        branches: [main]

permissions:
    contents: write
    issues: write
    pull-requests: write
    id-token: write # OIDC token for sigstore signing of build provenance
    attestations: write # write the artifact attestation for released assets

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - run: npm ci

            - run: npm run build

            - run: npm test

            - name: Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: npx semantic-release

            # Provenance for the released assets. semantic-release rebuilds
            # build/ during its prepare step (version-bump + npm run build), so
            # by the time it finishes the on-disk files are the exact bytes it
            # uploaded — attesting them here yields matching digests. Verify a
            # downloaded asset with: gh attestation verify main.js --repo MMoMM-org/miyo-tomo-hashi
            - name: Attest build provenance
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: |
                      build/main.js
                      build/manifest.json
                      build/styles.css
